# LEST control panel — serves the built SPA and reverse-proxies the API.
# __PANEL_DOMAIN__ is substituted by install.sh. Marked default_server so the panel
# answers requests by IP too (the installer also removes nginx's stock default site).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name __PANEL_DOMAIN__;

    root /opt/lest/apps/web/dist;
    index index.html;

    # API -> unprivileged control plane on localhost.
    location /api/ {
        proxy_pass http://127.0.0.1:4317;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ACME http-01 challenge webroot (used by certbot / LEST SSL).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
